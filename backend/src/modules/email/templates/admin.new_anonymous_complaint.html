<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>New Anonymous Complaint</title></head>
<body style="font-family:sans-serif;max-width:600px;margin:0 auto;padding:20px">
  <h2>New Anonymous Complaint Requires Review — {{publicId}}</h2>
  <p>An anonymous complaint has been submitted and is awaiting your review.</p>
  <table style="width:100%;border-collapse:collapse">
    <tr><td style="padding:8px;font-weight:bold;width:150px">Reference</td><td style="padding:8px">{{publicId}}</td></tr>
    <tr><td style="padding:8px;font-weight:bold">Category</td><td style="padding:8px">{{categoryName}}</td></tr>
    <tr><td style="padding:8px;font-weight:bold">Title</td><td style="padding:8px">{{title}}</td></tr>
    <tr><td style="padding:8px;font-weight:bold">Submitted</td><td style="padding:8px">{{submittedAt}}</td></tr>
  </table>
  <p><a href="{{adminUrl}}">Review in Admin Panel</a></p>
  <p>— Vallentin Claims Platform</p>
</body>
</html>
